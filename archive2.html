<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藏品档案库 · 蒲子农耕文化园</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --wheat: #c8a96e;
    --rust: #8b3a1a;
    --earth: #5c3d1e;
    --mist: #e8e0d0;
    --gold: #d4a843;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* 导航 */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 16px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(245,240,232,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(200,169,110,0.3);
  }

  .nav-logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--rust);
    text-decoration: none;
  }

  .nav-back {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--earth);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-back:hover { color: var(--rust); }

  /* 页头 */
  .page-header {
    padding: 60px 48px 40px;
    border-bottom: 1px solid rgba(200,169,110,0.2);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 24px;
  }

  .page-header-left {}

  .page-eyebrow {
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--wheat);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .page-eyebrow::before {
    content: '';
    width: 28px;
    height: 1px;
    background: var(--wheat);
  }

  .page-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 40px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
  }

  .page-count {
    margin-top: 12px;
    font-size: 13px;
    color: var(--earth);
    opacity: 0.6;
    letter-spacing: 1px;
  }

  /* 上传区域 */
  .upload-zone {
    border: 2px dashed rgba(200,169,110,0.4);
    padding: 28px 36px;
    display: flex;
    align-items: center;
    gap: 20px;
    cursor: pointer;
    transition: all 0.3s;
    background: rgba(200,169,110,0.04);
    min-width: 300px;
  }

  .upload-zone:hover {
    border-color: var(--wheat);
    background: rgba(200,169,110,0.08);
  }

  .upload-zone.dragover {
    border-color: var(--rust);
    background: rgba(139,58,26,0.05);
  }

  .upload-icon {
    font-size: 32px;
    opacity: 0.6;
  }

  .upload-text {}

  .upload-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--earth);
    margin-bottom: 4px;
  }

  .upload-hint {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--earth);
    opacity: 0.5;
  }

  .upload-btn {
    display: inline-block;
    margin-top: 8px;
    padding: 6px 16px;
    background: var(--rust);
    color: var(--paper);
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    border: none;
    font-family: 'Noto Sans SC', sans-serif;
    transition: background 0.2s;
  }

  .upload-btn:hover { background: var(--earth); }

  #fileInput { display: none; }

  /* 工具栏 */
  .toolbar {
    padding: 20px 48px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid rgba(200,169,110,0.15);
    background: var(--mist);
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    max-width: 360px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--paper);
    border: 1px solid rgba(200,169,110,0.3);
    padding: 10px 16px;
  }

  .search-box input {
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    color: var(--ink);
    width: 100%;
  }

  .search-box input::placeholder { color: rgba(92,61,30,0.4); }

  .filter-btn {
    padding: 10px 18px;
    border: 1px solid rgba(200,169,110,0.3);
    background: var(--paper);
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--earth);
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--rust);
    color: var(--paper);
    border-color: var(--rust);
  }

  .sort-select {
    padding: 10px 16px;
    border: 1px solid rgba(200,169,110,0.3);
    background: var(--paper);
    font-size: 12px;
    color: var(--earth);
    font-family: 'Noto Sans SC', sans-serif;
    outline: none;
    cursor: pointer;
  }

  /* 主内容区 */
  .main {
    padding: 40px 48px;
  }

  /* 空状态 */
  .empty-state {
    text-align: center;
    padding: 100px 40px;
  }

  .empty-icon {
    font-size: 64px;
    opacity: 0.3;
    margin-bottom: 24px;
  }

  .empty-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    color: var(--earth);
    margin-bottom: 12px;
    opacity: 0.6;
  }

  .empty-desc {
    font-size: 13px;
    color: var(--earth);
    opacity: 0.4;
    letter-spacing: 1px;
    line-height: 2;
  }

  /* 示例数据提示 */
  .demo-banner {
    background: rgba(139,58,26,0.06);
    border: 1px solid rgba(139,58,26,0.15);
    padding: 16px 24px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .demo-banner-text {
    font-size: 13px;
    color: var(--rust);
    letter-spacing: 1px;
  }

  .demo-banner-btn {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--rust);
    color: var(--rust);
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .demo-banner-btn:hover {
    background: var(--rust);
    color: var(--paper);
  }

  /* 藏品网格 */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  .card {
    background: white;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    position: relative;
    overflow: hidden;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(26,18,8,0.12);
  }

  .card-image {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card-image-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
  }

  .card-cat-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 4px 10px;
    font-size: 10px;
    letter-spacing: 1px;
    color: white;
  }

  .cat-农耕文化 { background: #5c3d1e; }
  .cat-红色文化 { background: #8b3a1a; }
  .cat-民俗文化 { background: #4a5240; }
  .cat-非遗项目 { background: #6b4c2a; }
  .cat-中国钱币 { background: #8b6914; }
  .cat-default { background: #777; }

  .card-info {
    padding: 18px 20px;
    border-top: 1px solid var(--mist);
  }

  .card-era {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--wheat);
    margin-bottom: 6px;
  }

  .card-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .card-desc {
    font-size: 12px;
    line-height: 1.8;
    color: var(--earth);
    opacity: 0.7;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-id {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(200,169,110,0.4);
  }

  /* 弹窗详情 */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--paper);
    width: 100%;
    max-width: 720px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    transform: translateY(20px);
    transition: transform 0.3s;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-close {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    justify-content: flex-end;
    padding: 16px 20px;
    background: var(--paper);
    border-bottom: 1px solid var(--mist);
  }

  .close-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--earth);
    opacity: 0.6;
    transition: opacity 0.2s;
    padding: 4px 8px;
  }

  .close-btn:hover { opacity: 1; }

  .modal-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .modal-image {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--ink);
    font-size: 80px;
  }

  .modal-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .modal-info {
    padding: 32px 28px;
  }

  .modal-category {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--wheat);
    margin-bottom: 12px;
  }

  .modal-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 4px;
    margin-bottom: 24px;
  }

  .modal-meta {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 24px;
  }

  .modal-meta-item {
    display: grid;
    grid-template-columns: 60px 1fr;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(200,169,110,0.15);
  }

  .modal-meta-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--wheat);
    padding-top: 2px;
  }

  .modal-meta-value {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.6;
  }

  .modal-desc {
    font-size: 13px;
    line-height: 2.2;
    color: var(--earth);
    opacity: 0.85;
    border-left: 2px solid var(--wheat);
    padding-left: 16px;
  }

  /* 下载模板按钮 */
  .template-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid rgba(200,169,110,0.4);
    color: var(--earth);
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.2s;
    text-decoration: none;
  }

  .template-btn:hover {
    background: var(--mist);
  }

  /* 无结果 */
  .no-results {
    text-align: center;
    padding: 80px;
    color: var(--earth);
    opacity: 0.5;
    font-size: 14px;
    letter-spacing: 2px;
  }

  /* 卡片底部 */
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 10px;
    border-top: 1px solid var(--mist);
  }

  .img-upload-btn {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--rust);
    cursor: pointer;
    padding: 4px 10px;
    border: 1px solid rgba(139,58,26,0.3);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .img-upload-btn:hover {
    background: var(--rust);
    color: var(--paper);
  }

  .upload-img-hint {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(26,18,8,0.5);
    color: rgba(245,240,232,0.6);
    font-size: 10px;
    letter-spacing: 1px;
    text-align: center;
    padding: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover .upload-img-hint { opacity: 1; }

  @media (max-width: 768px) {
    nav, .page-header, .toolbar, .main { padding-left: 20px; padding-right: 20px; }
    .page-header { flex-direction: column; align-items: flex-start; }
    .upload-zone { min-width: unset; width: 100%; }
    .modal-body { grid-template-columns: 1fr; }
    .modal-image { aspect-ratio: 4/3; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">蒲子农耕文化园</a>
  <a href="index.html" class="nav-back">← 返回首页</a>
</nav>

<div class="page-header">
  <div class="page-header-left">
    <div class="page-eyebrow">数字档案库</div>
    <h1 class="page-title">全部藏品</h1>
    <p class="page-count" id="countText">共 0 件藏品</p>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px;align-items:flex-end;">
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">📂</div>
      <div class="upload-text">
        <div class="upload-title">上传藏品表格</div>
        <div class="upload-hint">支持 .xlsx / .xls / .csv 格式</div>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
      </div>
    </div>
    <button class="template-btn" onclick="downloadTemplate()">⬇ 下载填写模板</button>
  </div>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
</div>

<div class="toolbar">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="搜索藏品名称、年代、介绍…">
  </div>
  <div id="filterBtns" style="display:flex;gap:8px;flex-wrap:wrap;">
    <button class="filter-btn active" data-cat="全部">全部</button>
    <button class="filter-btn" data-cat="农耕文化">农耕文化</button>
    <button class="filter-btn" data-cat="红色文化">红色文化</button>
    <button class="filter-btn" data-cat="民俗文化">民俗文化</button>
    <button class="filter-btn" data-cat="非遗项目">非遗项目</button>
    <button class="filter-btn" data-cat="中国钱币">中国钱币</button>
  </div>
  <select class="sort-select" id="sortSelect">
    <option value="id">按编号排序</option>
    <option value="era">按年代排序</option>
    <option value="name">按名称排序</option>
  </select>
</div>

<div class="main">
  <div class="demo-banner" id="demoBanner">
    <span class="demo-banner-text">📌 当前显示示例数据，上传你的藏品表格后自动替换</span>
    <button class="demo-banner-btn" onclick="document.getElementById('fileInput').click()">上传表格</button>
  </div>
  <div class="grid" id="grid"></div>
  <div class="no-results" id="noResults" style="display:none;">没有找到相关藏品</div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">🏛️</div>
    <div class="empty-title">还没有藏品</div>
    <div class="empty-desc">上传填好的 Excel 表格<br>藏品将自动显示在这里</div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-close">
      <button class="close-btn" onclick="closeModal()">✕ 关闭</button>
    </div>
    <div class="modal-body">
      <div class="modal-image" id="modalImage"></div>
      <div class="modal-info">
        <div class="modal-category" id="modalCategory"></div>
        <div class="modal-name" id="modalName"></div>
        <div class="modal-meta" id="modalMeta"></div>
        <div class="modal-desc" id="modalDesc"></div>
      </div>
    </div>
  </div>
</div>

<script>
// 示例数据
const demoData = [
  { id: "PZ-001", name: "石斧", era: "新石器时期", category: "农耕文化", material: "砂岩", size: "长约18cm", desc: "距今约5000年，以当地砂岩磨制而成，是人类从采集走向农耕的历史见证。斧刃弧度自然，握持部分留有明显磨痕。", emoji: "🪨", location: "晋西南地区" },
  { id: "PZ-002", name: "贝币", era: "商朝", category: "中国钱币", material: "天然贝壳", size: "约2-3cm", desc: "中国最早的货币形式，以天然贝壳充当交换媒介，距今约3000年，是中国货币演变史的重要起点。", emoji: "🐚", location: "黄河流域" },
  { id: "PZ-003", name: "陶罐", era: "汉代", category: "农耕文化", material: "黑陶", size: "高约30cm", desc: "汉代民间日常储存器具，黑陶工艺烧制，器型规整，保存完好，反映了两千年前普通百姓的日常生活。", emoji: "🏺", location: "山西境内" },
  { id: "PZ-004", name: "纺车", era: "清代", category: "民俗文化", material: "木质", size: "高约80cm", desc: "农村妇女纺线织布的主要工具，见证了中国纺织文明的发展历程，是家庭手工业的重要代表。", emoji: "🌀", location: "蒲县本地" },
  { id: "PZ-005", name: "粮票", era: "1950s-1970s", category: "红色文化", material: "纸质", size: "标准票据", desc: "供给时代的历史见证，记录着计划经济年代特殊的生活方式，是那个时代集体记忆的重要载体。", emoji: "📜", location: "山西省" },
  { id: "PZ-006", name: "方孔圆钱", era: "秦代", category: "中国钱币", material: "青铜", size: "直径约2.5cm", desc: "秦始皇统一六国后推行的标准货币，外圆内方，象征天圆地方的哲学理念，是中国货币史的里程碑。", emoji: "🪙", location: "关中地区" },
  { id: "PZ-007", name: "犁", era: "民国时期", category: "农耕文化", material: "木质铁件", size: "全长约150cm", desc: "传统木犁，用于耕地翻土，是农耕文明最具代表性的工具之一。这件藏品至今保存完整，犁铧锋利如新。", emoji: "🌾", location: "蒲县本地" },
  { id: "PZ-008", name: "煤油灯", era: "民国至1950s", category: "民俗文化", material: "铁质玻璃", size: "高约25cm", desc: "电力普及前农村家庭主要照明工具，见证了农村从煤油灯到电灯的历史变迁，承载着几代人的夜晚记忆。", emoji: "🪔", location: "蒲县本地" },
  { id: "PZ-009", name: "结婚证", era: "1950s", category: "红色文化", material: "纸质", size: "A4大小", desc: "新中国成立初期的结婚证书，红色封面印有毛主席语录，是那个特殊年代婚姻制度变革的历史见证。", emoji: "📋", location: "临汾地区" },
  { id: "PZ-010", name: "石香炉", era: "明代", category: "民俗文化", material: "青石", size: "高约40cm", desc: "明代民间祭祀用香炉，石雕工艺精湛，三足鼎立，炉身刻有云纹，是民间宗教信仰与石雕艺术的结合。", emoji: "🫙", location: "蒲县" },
  { id: "PZ-011", name: "铜火锅", era: "清代", category: "民俗文化", material: "铜质", size: "直径约35cm", desc: "清代民间宴客用铜火锅，中间烟囱式设计，炭火加热，做工精良，是当时富裕家庭待客之道的体现。", emoji: "🍲", location: "山西境内" },
  { id: "PZ-012", name: "树化石", era: "一万年以前", category: "农耕文化", material: "硅化木", size: "约60cm", desc: "距今一万年以前的树木化石，是蒲子农耕文化园历史跨度最长的藏品，见证了这片土地亿万年的地质变迁。", emoji: "🪵", location: "蒲县境内" },
];

let allData = [...demoData];
let filteredData = [...demoData];
let currentCat = "全部";
let currentSearch = "";
let isDemo = true;
// 图片存储：key = 藏品id，value = base64 dataURL
const imageStore = {};

const catColors = {
  "农耕文化": "#5c3d1e22",
  "红色文化": "#8b3a1a22",
  "民俗文化": "#4a524022",
  "非遗项目": "#6b4c2a22",
  "中国钱币": "#8b691422",
};

function render() {
  const grid = document.getElementById('grid');
  const noResults = document.getElementById('noResults');
  const emptyState = document.getElementById('emptyState');

  if (allData.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'none';
    emptyState.style.display = 'block';
    return;
  }

  emptyState.style.display = 'none';

  let data = allData.filter(item => {
    const matchCat = currentCat === "全部" || item.category === currentCat;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || 
      (item.name && item.name.toLowerCase().includes(q)) ||
      (item.era && item.era.toLowerCase().includes(q)) ||
      (item.desc && item.desc.toLowerCase().includes(q)) ||
      (item.material && item.material.toLowerCase().includes(q));
    return matchCat && matchSearch;
  });

  const sort = document.getElementById('sortSelect').value;
  if (sort === 'name') data.sort((a,b) => (a.name||'').localeCompare(b.name||''));
  else if (sort === 'era') data.sort((a,b) => (a.era||'').localeCompare(b.era||''));

  filteredData = data;

  document.getElementById('countText').textContent = `共 ${allData.length} 件藏品${filteredData.length !== allData.length ? `，筛选显示 ${filteredData.length} 件` : ''}`;

  if (data.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }

  noResults.style.display = 'none';

  grid.innerHTML = data.map((item, i) => {
    const catClass = `cat-${item.category || 'default'}`;
    const bg = catColors[item.category] || '#77777722';
    const storedImg = imageStore[item.id];
    const imgHtml = storedImg
      ? `<img src="${storedImg}" alt="${item.name}" style="width:100%;height:100%;object-fit:cover;">`
      : `<div class="card-image-placeholder" style="background:${bg}"><span style="font-size:56px">${item.emoji||'🏺'}</span></div>`;

    return `
    <div class="card" id="card-${item.id}">
      <div class="card-image" onclick="openModal(${i})" style="cursor:pointer;">
        ${imgHtml}
        <span class="card-cat-badge ${catClass}">${item.category || ''}</span>
        ${storedImg ? '' : `<div class="upload-img-hint">点击卡片右下角上传图片</div>`}
      </div>
      <div class="card-info" onclick="openModal(${i})" style="cursor:pointer;">
        <div class="card-era">${item.era || ''}</div>
        <div class="card-name">${item.name || '未命名'}</div>
        <div class="card-desc">${item.desc || ''}</div>
      </div>
      <div class="card-footer">
        <div class="card-id">${item.id || ''}</div>
        <label class="img-upload-btn" title="上传图片">
          ${storedImg ? '🔄 换图' : '📷 上传图片'}
          <input type="file" accept="image/*" style="display:none" onchange="uploadCardImage(event, '${item.id}')">
        </label>
      </div>
    </div>`;
  }).join('');
}

function openModal(index) {
  const item = filteredData[index];
  if (!item) return;

  const bg = catColors[item.category] || '#77777722';
  const storedImg = imageStore[item.id];
  const imgHtml = storedImg
    ? `<img src="${storedImg}" alt="${item.name}" style="width:100%;height:100%;object-fit:cover;">`
    : `<span style="font-size:80px">${item.emoji||'🏺'}</span>`;

  document.getElementById('modalImage').innerHTML = imgHtml;
  document.getElementById('modalImage').style.background = item.imageUrl ? 'var(--ink)' : bg;
  document.getElementById('modalCategory').textContent = item.category || '';
  document.getElementById('modalName').textContent = item.name || '';
  document.getElementById('modalDesc').textContent = item.desc || '';

  const metaFields = [
    ['年代', item.era],
    ['材质', item.material],
    ['尺寸', item.size],
    ['出土地', item.location],
    ['编号', item.id],
  ].filter(([,v]) => v);

  document.getElementById('modalMeta').innerHTML = metaFields.map(([l,v]) => `
    <div class="modal-meta-item">
      <div class="modal-meta-label">${l}</div>
      <div class="modal-meta-value">${v}</div>
    </div>
  `).join('');

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay') && !e.target.closest('.close-btn')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// 搜索
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

// 筛选
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });
});

// 排序
document.getElementById('sortSelect').addEventListener('change', render);

// 上传Excel
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  readExcel(file);
});

// 拖拽上传
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) readExcel(file);
});

function readExcel(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { defval: '' });

      if (raw.length === 0) {
        alert('表格里没有数据，请检查格式');
        return;
      }

      // 字段映射（兼容中英文列名）
      allData = raw.map((row, i) => ({
        id: row['编号'] || row['id'] || `PZ-${String(i+1).padStart(3,'0')}`,
        name: row['名称'] || row['name'] || '',
        era: row['年代'] || row['era'] || '',
        category: row['类别'] || row['category'] || '农耕文化',
        material: row['材质'] || row['material'] || '',
        size: row['尺寸'] || row['size'] || '',
        location: row['出土地'] || row['location'] || '',
        desc: row['介绍'] || row['desc'] || row['description'] || '',
        emoji: row['emoji'] || '🏺',
        imageUrl: row['图片'] || row['image'] || '',
      }));

      isDemo = false;
      document.getElementById('demoBanner').style.display = 'none';
      currentCat = "全部";
      currentSearch = "";
      document.getElementById('searchInput').value = '';
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-cat="全部"]').classList.add('active');
      render();
    } catch(err) {
      alert('读取失败，请确认是 .xlsx 或 .csv 格式');
    }
  };
  reader.readAsArrayBuffer(file);
}

// 上传单张藏品图片
function uploadCardImage(e, itemId) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    imageStore[itemId] = ev.target.result;
    render(); // 重新渲染，图片显示出来
  };
  reader.readAsDataURL(file);
}

// 下载模板
function downloadTemplate() {
  const ws = XLSX.utils.aoa_to_sheet([
    ['编号', '名称', '年代', '类别', '材质', '尺寸', '出土地', '介绍', 'emoji'],
    ['PZ-001', '石斧', '新石器时期', '农耕文化', '砂岩', '长约18cm', '晋西南', '距今约5000年，磨制石器…', '🪨'],
    ['PZ-002', '贝币', '商朝', '中国钱币', '天然贝壳', '约2cm', '黄河流域', '中国最早的货币形式…', '🐚'],
  ]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '藏品档案');
  XLSX.writeFile(wb, '蒲子农耕文化园藏品模板.xlsx');
}

// 初始化
render();
</script>
</body>
</html>
